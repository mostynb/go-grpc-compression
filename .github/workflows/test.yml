name: go test

on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:

jobs:
  linux:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
      - name: test
        run: |
          set -euo pipefail
          go test ./...
          go test -race ./...
